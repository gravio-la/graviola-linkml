# LinkML fixture mirroring item-schema.ts, enriched with gra: annotations.
# The gra: annotations drive side-schema generation (primaryFields, labels, overrides).
# Structured annotation values use the explicit "value:" key because linkml-runtime
# parses bare mapping values as Annotation constructor kwargs (only tag/value accepted).
# This file is separate from item_schema.yaml so Phase 1 JSON Schema tests are unchanged.
id: http://www.example.org/example/
name: item-schema
prefixes:
  linkml: https://w3id.org/linkml/
  ex:     http://www.example.org/example/
  gra:    https://graviola.gra.one/schema/
default_prefix: ex
default_range: string
imports:
  - linkml:types

classes:

  Category:
    class_uri: ex:Category
    annotations:
      gra:label: "Kategorie"
      gra:displayAs: dropdown
      gra:primaryLabel: name
      gra:primaryDescription: description
      gra:primaryImage: image
    slots:
      - name
      - description
      - image
      - basePrice
      - subCategories
      - parentCategory
    slot_usage:
      name:
        required: true
      subCategories:
        annotations:
          gra:form:
            value:
              options:
                dropdown: true
                chips: true
          gra:detail:
            value:
              skip: true
      parentCategory:
        annotations:
          gra:detail:
            value:
              label: "Übergeordnete Kategorie"
      basePrice:
        annotations:
          gra:detail:
            value:
              label: "Basispreis (€)"

  Item:
    class_uri: ex:Item
    annotations:
      gra:label: "Artikel"
      gra:primaryLabel: name
      gra:primaryDescription: description
      gra:primaryImage: photos
    slots:
      - name
      - description
      - parent
      - photos
      - condition
      - category
      - vendor
      - tags
      - basePrice
      - isAvailable
    slot_usage:
      photos:
        annotations:
          gra:detail:
            value:
              skip: true
      basePrice:
        annotations:
          gra:detail:
            value:
              label: "Preis (€)"
      isAvailable:
        annotations:
          gra:detail:
            value:
              label: "Verfügbar"
      tags:
        annotations:
          gra:form:
            value:
              options:
                chips: true
                dropdown: true

  Tag:
    class_uri: ex:Tag
    annotations:
      gra:label: "Tag"
      gra:displayAs: chips
      gra:primaryLabel: name
      gra:primaryDescription: description
      gra:primaryImage: image
    slots:
      - name
      - description
      - image

  Vendor:
    class_uri: ex:Vendor
    annotations:
      gra:label: "Lieferant"
      gra:displayAs: dropdown
      gra:primaryLabel: name
      gra:primaryDescription: description
      gra:primaryImage: logo
    slots:
      - name
      - description
      - website
      - email
      - address
      - logo
    slot_usage:
      name:
        required: true
      logo:
        annotations:
          gra:detail:
            value:
              skip: true

slots:

  name:
    range: string

  description:
    range: string

  image:
    range: string

  basePrice:
    range: integer
    minimum_value: 0

  isAvailable:
    range: boolean

  condition:
    range: string

  website:
    range: string

  email:
    range: string

  address:
    range: string

  logo:
    range: string

  photos:
    range: string
    multivalued: true

  parentCategory:
    range: Category
    inlined: true

  subCategories:
    range: Category
    multivalued: true
    inlined: true
    inverse: parentCategory

  parent:
    range: Item
    inlined: true

  category:
    range: Category
    inlined: true

  vendor:
    range: Vendor
    inlined: true

  tags:
    range: Tag
    multivalued: true
    inlined: true
